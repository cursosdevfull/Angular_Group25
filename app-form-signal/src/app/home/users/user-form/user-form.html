<form>
    <div class="field">
        <label for="name">Nombre</label>
        <input id="name" type="text" [formField]="userForm.name">
        <app-error-validations [fs]="userForm.name()"></app-error-validations>
    </div>

    <div class="field">
        <label for="lastname">Apellido</label>
        <input id="lastname" type="text" [formField]="userForm.lastname">
        <app-error-validations [fs]="userForm.lastname()"></app-error-validations>
    </div>

    <div class="field">
        <label for="email">Correo</label>
        <input id="email" type="email" [formField]="userForm.email">
        <app-error-validations [fs]="userForm.email()"></app-error-validations>
    </div>

    <div class="field">
        <label for="age">Edad</label>
        <input id="age" type="number" [formField]="userForm.age">
        <app-error-validations [fs]="userForm.age()"></app-error-validations>
    </div>

    <div class="field">
        <label for="gender">Género</label>
        <select id="gender" [formField]="userForm.gender">
            <option value="male">Masculino</option>
            <option value="female">Femenino</option>
        </select>
    </div>

    <button type="button" (click)="onSubmit()">{{title}}</button>
    <button type="button" (click)="reset()">Reset</button>
    <app-error-validations [fs]="userForm()"></app-error-validations>
</form>
