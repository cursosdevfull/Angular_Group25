@let it = item();
@if(it) {
<div class="cart-item">
    <div class="cart-item__info">
        <span class="cart-item__name">{{ it.name }}</span>
        <span class="cart-item__qty">x{{ it.quantity }}</span>
    </div>
    <div class="cart-item__right">
        <span class="cart-item__price">US$ {{ it.price }}</span>
        <button class="cart-item__remove" (click)="removeItem()" title="Remove item">&#10005;</button>
    </div>
</div>
}
