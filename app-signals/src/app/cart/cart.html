<div class="cart">
    <h2 class="cart__title">&#128722; Shopping Cart</h2>

    @if(listProductsCart().length === 0) {
    <p class="cart__empty">Your cart is empty.</p>
    } @else {
    <div class="cart__items">
        @for(item of listProductsCart(); track item.id) {
        <app-cart-item [item]="item" (onRemove)="removeItem($event)"></app-cart-item>
        }
    </div>
    <div class="cart__footer">
        <span class="cart__total-label">Total</span>
        <span class="cart__total-value">US$ {{ total() }}</span>
    </div>
    }
</div>
